version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: studentpath_redis_local
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder        # <--- Local dev fix
    container_name: studentpath_be_local
    command: npm run dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder        # <--- Local dev fix (Stage 2 par ruk jayega)
    container_name: studentpath_fe_local
    command: npm run dev     # <--- Hot reload active karega
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true  # <--- Windows 10 Fix
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend