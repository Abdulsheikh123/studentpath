version: "3.8"

services:
  # 1. Redis
  redis:
    image: redis:alpine
    container_name: studentpath_redis_prod
    restart: always
    volumes:
      - redis_prod_data:/data

  # 2. Database
  db:
    image: postgres:15-alpine
    container_name: studentpath_db_prod
    restart: always
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
      POSTGRES_DB: ${DB_NAME:-studentpath}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  # 3. Backend
  backend:
    build: ./backend
    container_name: studentpath_be_prod
    restart: always
    env_file:
      - .env.prod
    environment:
      - PORT=5000 # <--- Yeh line zaroori hai!
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  # 4. Frontend
  frontend:
    build: ./frontend
    container_name: studentpath_fe_prod
    restart: always
    env_file:
      - .env.prod
    depends_on:
      backend:
        condition: service_started

  # 5. Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: studentpath_nginx_prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

volumes:
  pgdata_prod:
  redis_prod_data:
