server {
    listen 80; # Nginx port 80 par sunega (standard web port)

    # 1. Frontend requests
    location / {
        proxy_pass http://frontend:3000; # Frontend service ka naam jo docker mein hai
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Backend API requests
    # Agar aapki saari API requests /api se shuru hoti hain
    location /api/ {
        proxy_pass http://backend:5000/; # Backend service ka naam
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}